<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Pager Device</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --body:#0b0d0c;
      --device:#c9c2b4;
      --device-2:#b3ab9b;
      --edge:#8f8778;
      --panel:#1a1d1b;
      --panel-2:#0f1211;
      --line:#9eb8ae;
      --line-2:#6c8178;
      --text:#eef2ec;
      --muted:#b7aa8c;
      --accent:#c4a26a;
      --dark:#23211c;
      --plate:#d8d1c4;
      --plate-text:#302c25;
      --red:#b14a41;
      --red-soft:#7d3029;
      --green-bar:#6f9b63;
      --green-bar-dark:#4c6d45;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--body);
      font-family:'Orbitron', monospace;
    }

    body{
      padding:6px;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.03), transparent 20%),
        radial-gradient(circle at bottom, rgba(120,90,50,0.03), transparent 28%),
        var(--body);
    }

    .device{
      position:relative;
      width:100%;
      max-width:760px;
      height:calc(100dvh - 12px);
      margin:0 auto;
      border-radius:18px;
      background:
        linear-gradient(180deg, #d8d2c6 0%, #beb6a8 45%, #a69d8e 100%);
      border:1px solid #827969;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        inset 0 -12px 30px rgba(70,55,35,0.10),
        0 8px 24px rgba(0,0,0,0.28);
      overflow:hidden;
      padding:12px 12px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .device::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:14px;
      border:1px solid rgba(70,60,48,0.15);
      pointer-events:none;
    }

    .device::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,0.12), transparent 10%),
        radial-gradient(circle at 78% 72%, rgba(90,55,30,0.08), transparent 10%),
        radial-gradient(circle at 30% 80%, rgba(70,50,35,0.05), transparent 14%),
        linear-gradient(135deg, rgba(70,50,35,0.04), transparent 40%);
      mix-blend-mode:multiply;
    }

    .weathering{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.22;
      background:
        radial-gradient(circle at 14% 18%, rgba(85,70,45,.30) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 14%, rgba(85,70,45,.22) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 78%, rgba(85,70,45,.20) 0 1px, transparent 2px),
        radial-gradient(circle at 20% 86%, rgba(85,70,45,.18) 0 1px, transparent 2px),
        linear-gradient(115deg, transparent 0 68%, rgba(90,60,35,.08) 74%, transparent 80%);
      background-size: 180px 180px, 220px 220px, 200px 200px, 240px 240px, 100% 100%;
    }

    .top-module{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:start;
      flex:0 0 auto;
    }

    .nameplate{
      background:linear-gradient(180deg, #e4ddd1, #cfc7ba);
      color:var(--plate-text);
      border:1px solid #8e8474;
      border-radius:8px;
      padding:8px 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
      position:relative;
    }

    .nameplate::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:8px;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 30%),
        radial-gradient(circle at 20% 30%, rgba(90,70,50,.06) 0 1px, transparent 2px);
      opacity:.4;
      mix-blend-mode:multiply;
    }

    .nameplate .brand{
      font-size:22px;
      font-weight:700;
      letter-spacing:1px;
      line-height:1;
    }

    .nameplate .sub{
      margin-top:5px;
      font-size:10px;
      color:#6d624f;
      line-height:1.2;
      text-transform:uppercase;
    }

    .hardware{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .dial{
      width:42px;
      height:42px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%, #7b7469, #47433d 70%);
      border:2px solid #908777;
      box-shadow:
        inset 0 2px 3px rgba(255,255,255,0.12),
        0 2px 4px rgba(0,0,0,0.2);
      position:relative;
    }

    .dial::after{
      content:"";
      position:absolute;
      top:7px;
      left:19px;
      width:2px;
      height:12px;
      background:#d7c9a8;
      border-radius:2px;
      transform:rotate(35deg);
      transform-origin:bottom center;
    }

    .sensor{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#302d29;
      border:2px solid #8d8476;
    }

    .screen-shell{
      position:relative;
      flex:1 1 auto;
      min-height:0;
      padding:10px;
      background:linear-gradient(180deg, #a69d8d, #8d8476);
      border-radius:14px;
      border:1px solid #6f675a;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -5px 18px rgba(40,35,28,0.12);
    }

    .screen-shell::before,
    .screen-shell::after{
      content:"";
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#5b5448;
      border:1px solid #968b7a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .screen-shell::before{ top:8px; left:8px; }
    .screen-shell::after{ bottom:8px; right:8px; }

    .screen-bezel{
      height:100%;
      border:2px solid #5a5f58;
      border-radius:10px;
      background:linear-gradient(180deg, #161918, #0c0f0e);
      padding:8px;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .status-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      color:var(--accent);
      font-size:10px;
      text-transform:uppercase;
      flex:0 0 auto;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--red);
      border:1px solid var(--red-soft);
      animation:blink 1.2s infinite;
    }

    @keyframes blink{
      0%,100%{opacity:.25}
      50%{opacity:.95}
    }

    .field{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .field.compact{
      margin-bottom:8px;
      flex:0 0 auto;
    }

    .label{
      font-size:9px;
      color:#6f664f;
      text-transform:uppercase;
      margin-bottom:3px;
    }

    .screen-input{
      width:100%;
      padding:10px 10px;
      font-family:'Orbitron', monospace;
      font-size:12px;
      color:#edf1eb;
      background:linear-gradient(180deg, #111513, #0a0d0c);
      border:2px solid #65796f;
      outline:none;
      border-radius:0;
    }

    .screen-area{
      flex:1 1 auto;
      min-height:0;
      border:2px solid var(--line-2);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)),
        linear-gradient(180deg, rgba(126,148,138,0.04), rgba(0,0,0,0)),
        var(--panel-2);
      padding:8px;
      overflow:auto;
      position:relative;
    }

    .screen-area::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 2px,
        rgba(170,190,180,0.015) 3px
      );
      opacity:0.3;
    }

    .empty{
      color:#8d948b;
      font-size:11px;
      text-transform:uppercase;
      position:relative;
      z-index:1;
    }

    .msg{
      position:relative;
      z-index:1;
      margin-bottom:8px;
      padding:8px 10px;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border-left:5px solid var(--green-bar);
    }

    .meta{
      font-size:9px;
      color:var(--muted);
      margin-bottom:5px;
      text-transform:uppercase;
      line-height:1.25;
    }

    .text{
      font-size:15px;
      color:var(--text);
      line-height:1.35;
      letter-spacing:0.1px;
      word-break:break-word;
    }

    .divider{
      margin-top:6px;
      height:1px;
      background:linear-gradient(90deg, rgba(111,155,99,0.7), rgba(111,155,99,0));
    }

    .control-panel{
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:7px;
      min-height:0;
    }

    .control-input{
      width:100%;
      padding:10px 10px;
      font-family:'Orbitron', monospace;
      font-size:12px;
      color:#edf1eb;
      background:linear-gradient(180deg, #111513, #0a0d0c);
      border:2px solid #65796f;
      outline:none;
      border-radius:0;
    }

    .control-input::placeholder{
      color:#858d84;
    }

    .control-input:focus{
      border-color:#b6955d;
    }

    .bottom-row{
      display:grid;
      grid-template-columns: 160px 1fr;
      gap:10px;
      align-items:end;
    }

    .btn{
      width:100%;
      padding:13px 12px;
      font-family:'Orbitron', monospace;
      font-size:12px;
      border:1px solid #8f7a53;
      color:#2a261f;
      background:linear-gradient(180deg, #d8be88, #b39259);
      cursor:pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .hint{
      align-self:center;
      font-size:10px;
      color:#736a57;
      text-transform:uppercase;
      line-height:1.25;
    }

    @media (max-width:640px){
      .device{
        padding:10px 10px 12px;
      }

      .nameplate .brand{
        font-size:18px;
      }

      .nameplate .sub{
        font-size:9px;
      }

      .dial{
        width:36px;
        height:36px;
      }

      .bottom-row{
        grid-template-columns: 1fr;
        gap:6px;
      }

      .hint{
        display:none;
      }

      .btn{
        padding:11px 10px;
      }

      .text{
        font-size:14px;
      }
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="weathering"></div>

    <div class="top-module">
      <div class="nameplate">
        <div class="brand">NU PAGER</div>
        <div class="sub">REBEL SIGNAL NODE · STEAM-CORE COMMUNICATOR</div>
      </div>

      <div class="hardware">
        <div class="sensor"></div>
        <div class="dial"></div>
      </div>
    </div>

    <div class="screen-shell">
      <div class="screen-bezel">
        <div class="status-row" id="status">
          <div class="dot"></div>
          CHANNEL ONLINE
        </div>

        <div class="field compact">
          <div class="label">Unit Identification</div>
          <input class="screen-input" id="device" value="BOOTING..." readonly>
        </div>

        <div class="screen-area" id="screen">
          <div class="empty" id="emptyState">NO INCOMING SIGNAL</div>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <div class="field">
        <div class="label">Transmit To</div>
        <input class="control-input" id="to" placeholder="NP-0001">
      </div>

      <div class="field">
        <div class="label">Message Payload</div>
        <input class="control-input" id="msg" maxlength="80" placeholder="ENTER MESSAGE">
      </div>

      <div class="bottom-row">
        <button class="btn" id="send" disabled>TRANSMIT</button>
        <div class="hint">Direct device message · private channel</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
      authDomain: "nu-pager-network.firebaseapp.com",
      databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
      projectId: "nu-pager-network",
      storageBucket: "nu-pager-network.firebasestorage.app",
      messagingSenderId: "1037097080836",
      appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const toInput = document.getElementById("to");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const screen = document.getElementById("screen");
    const deviceBox = document.getElementById("device");
    const statusBox = document.getElementById("status");
    const emptyState = document.getElementById("emptyState");

    let deviceID = localStorage.getItem("deviceID") || "";

    async function registerDevice(){
      if(!deviceID){
        const counterRef = ref(db, "deviceCounter");
        const result = await runTransaction(counterRef, current => (current || 0) + 1);
        const number = result.snapshot.val();
        deviceID = "NP-" + String(number).padStart(4, "0");
        localStorage.setItem("deviceID", deviceID);
      }

      deviceBox.value = deviceID;
      statusBox.innerHTML = '<div class="dot"></div>CHANNEL ONLINE';
      sendBtn.disabled = false;
    }

    function showMessage(msg){
      if(emptyState) emptyState.style.display = "none";

      const wrapper = document.createElement("div");
      wrapper.className = "msg";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerText = "INCOMING FROM : " + (msg.from || "UNKNOWN");

      const text = document.createElement("div");
      text.className = "text";
      text.innerText = msg.text || "";

      const divider = document.createElement("div");
      divider.className = "divider";

      wrapper.appendChild(meta);
      wrapper.appendChild(text);
      wrapper.appendChild(divider);
      screen.appendChild(wrapper);
      screen.scrollTop = screen.scrollHeight;
    }

    await registerDevice();

    sendBtn.onclick = async () => {
      const to = toInput.value.trim().toUpperCase();
      const text = msgInput.value.trim();

      if(!to){
        alert("ENTER TARGET DEVICE ID");
        return;
      }

      if(!text){
        return;
      }

      sendBtn.disabled = true;
      statusBox.innerHTML = '<div class="dot"></div>TRANSMITTING...';

      try{
        await push(ref(db, "messages/" + to), {
          from: deviceID,
          text: text,
          time: Date.now()
        });

        msgInput.value = "";
        statusBox.innerHTML = '<div class="dot"></div>TRANSMISSION SENT';

        setTimeout(() => {
          statusBox.innerHTML = '<div class="dot"></div>CHANNEL ONLINE';
        }, 1200);
      }catch(err){
        console.error(err);
        alert("TRANSMISSION FAILED");
        statusBox.innerHTML = '<div class="dot"></div>CHANNEL ERROR';
      }finally{
        sendBtn.disabled = false;
      }
    };

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendBtn.click();
      }
    });

    onChildAdded(ref(db, "messages/" + deviceID), (data) => {
      const msg = data.val();
      showMessage(msg);
      statusBox.innerHTML = '<div class="dot"></div>NEW INCOMING SIGNAL';
    });
  </script>
</body>
</html>
