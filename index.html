<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>NU Pager Device</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg:#111312;
      --stone-1:#1a1d1c;
      --stone-2:#0d0f0f;

      --device-top:#d7d1c5;
      --device-mid:#c4bcae;
      --device-bot:#a79f90;
      --device-edge:#817968;

      --screen-bg:#0b0e0d;
      --screen-line-dark:#60766d;

      --text:#edf2ec;
      --muted:#b8ad92;
      --accent:#c5a56c;

      --alert-red:#b44239;
      --alert-red-dark:#752820;

      --clear-red:#8e2d2a;
      --clear-red-dark:#5e1c1a;
      --clear-red-text:#f1d7d5;

      --msg-green:#7fb36f;

      --plate-text:#2c2922;

      --sound-top:#b9c7c0;
      --sound-bot:#7d8f87;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
    }

    body{
      overflow:hidden;
      font-family:'Orbitron', monospace;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.035), transparent 20%),
        radial-gradient(circle at bottom, rgba(120,90,55,.05), transparent 30%),
        linear-gradient(180deg, var(--stone-1), var(--stone-2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        max(14px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.22;
      background-image:
        radial-gradient(rgba(255,255,255,.05) 0.7px, transparent 0.8px),
        linear-gradient(135deg, rgba(255,255,255,.02), transparent 45%),
        linear-gradient(45deg, rgba(0,0,0,.08), transparent 40%);
      background-size: 8px 8px, 100% 100%, 100% 100%;
      mix-blend-mode:screen;
    }

    .stage{
      width:min(100%, 520px);
      height:min(100%, 920px);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .device-shadow{
      position:absolute;
      width:88%;
      height:84%;
      border-radius:28px;
      background:radial-gradient(
        ellipse at center,
        rgba(0,0,0,.40) 0%,
        rgba(0,0,0,.22) 45%,
        rgba(0,0,0,0) 72%
      );
      transform:translateY(26px) scale(1.03);
      filter:blur(18px);
      pointer-events:none;
    }

    .device{
      position:relative;
      width:min(100%, 430px);
      height:min(100%, 860px);
      max-height:88vh;
      border-radius:26px;
      background:
        linear-gradient(180deg, var(--device-top) 0%, var(--device-mid) 50%, var(--device-bot) 100%);
      border:1px solid var(--device-edge);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -14px 28px rgba(90,70,40,.12),
        0 18px 36px rgba(0,0,0,.28);
      overflow:hidden;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transform:perspective(1200px) rotateX(.3deg);
    }

    .device::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:20px;
      border:1px solid rgba(70,60,45,.16);
      pointer-events:none;
    }

    .device::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.28;
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.16), transparent 11%),
        radial-gradient(circle at 82% 20%, rgba(70,50,35,.12), transparent 10%),
        radial-gradient(circle at 78% 80%, rgba(90,60,35,.10), transparent 12%),
        linear-gradient(120deg, transparent 0 70%, rgba(90,60,35,.08) 76%, transparent 82%);
      mix-blend-mode:multiply;
    }

    .weather{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background:
        radial-gradient(circle at 18% 28%, rgba(85,70,45,.30) 0 1px, transparent 2px),
        radial-gradient(circle at 83% 16%, rgba(85,70,45,.22) 0 1px, transparent 2px),
        radial-gradient(circle at 86% 72%, rgba(85,70,45,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 22% 84%, rgba(85,70,45,.16) 0 1px, transparent 2px),
        linear-gradient(105deg, transparent 0 72%, rgba(80,60,35,.06) 78%, transparent 84%);
      background-size:180px 180px, 220px 220px, 210px 210px, 240px 240px, 100% 100%;
      mix-blend-mode:multiply;
    }

    .top{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:start;
      flex:0 0 auto;
      z-index:1;
    }

    .top-left{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .plate{
      border-radius:12px;
      border:1px solid #918674;
      background:
        linear-gradient(180deg, #e4ddd1, #cfc8bb);
      color:var(--plate-text);
      padding:10px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.34);
      position:relative;
    }

    .plate::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:12px;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 32%),
        linear-gradient(120deg, transparent 0 74%, rgba(80,60,35,.06) 80%, transparent 86%);
      mix-blend-mode:multiply;
      opacity:.8;
    }

    .brand{
      font-size:22px;
      font-weight:700;
      letter-spacing:1px;
      line-height:1;
      position:relative;
      z-index:1;
    }

    .sub{
      margin-top:6px;
      font-size:10px;
      line-height:1.2;
      text-transform:uppercase;
      color:#655b49;
      position:relative;
      z-index:1;
    }

    .serial-plate{
      border-radius:10px;
      border:1px solid #918674;
      background:
        linear-gradient(180deg, #ddd6ca, #c8c1b3);
      color:var(--plate-text);
      padding:8px 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.30);
      position:relative;
    }

    .serial-plate::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:10px;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), transparent 35%);
      mix-blend-mode:multiply;
      opacity:.8;
    }

    .serial-label{
      font-size:8px;
      text-transform:uppercase;
      color:#625846;
      margin-bottom:4px;
      position:relative;
      z-index:1;
    }

    .serial-value{
      font-size:16px;
      letter-spacing:1px;
      color:#27231d;
      line-height:1.1;
      position:relative;
      z-index:1;
    }

    .hardware{
      display:flex;
      gap:8px;
      align-items:center;
      padding-top:4px;
      z-index:1;
    }

    .sensor{
      width:16px;
      height:16px;
      border-radius:50%;
      background:#302d29;
      border:2px solid #8d8476;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    }

    .dial{
      width:44px;
      height:44px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%, #7c7569, #47433d 70%);
      border:2px solid #908777;
      box-shadow:
        inset 0 2px 3px rgba(255,255,255,.12),
        0 2px 4px rgba(0,0,0,.18);
      position:relative;
    }

    .dial::after{
      content:"";
      position:absolute;
      top:7px;
      left:21px;
      width:2px;
      height:13px;
      background:#d7c9a8;
      border-radius:2px;
      transform:rotate(35deg);
      transform-origin:bottom center;
    }

    .mid{
      flex:1 1 auto;
      min-height:0;
      padding:10px;
      background:linear-gradient(180deg, #a69d8d, #8d8476);
      border-radius:18px;
      border:1px solid #6f675a;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -5px 18px rgba(40,35,28,.12);
      position:relative;
      z-index:1;
    }

    .mid::before,
    .mid::after{
      content:"";
      position:absolute;
      width:9px;
      height:9px;
      border-radius:50%;
      background:#5b5448;
      border:1px solid #968b7a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .mid::before{ top:8px; left:8px; }
    .mid::after{ bottom:8px; right:8px; }

    .bezel{
      height:100%;
      border-radius:14px;
      border:2px solid #5a5f58;
      background:linear-gradient(180deg, #171a19, #0c0f0e);
      padding:8px;
      display:flex;
      flex-direction:column;
      min-height:0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .screen-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
      margin-bottom:6px;
    }

    .status{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--accent);
      font-size:10px;
      text-transform:uppercase;
      min-width:0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--alert-red);
      border:1px solid var(--alert-red-dark);
      animation:blink 1.25s infinite;
      box-shadow: 0 0 6px rgba(180,66,57,.15);
      flex:0 0 auto;
    }

    @keyframes blink{
      0%,100%{opacity:.22}
      50%{opacity:.98}
    }

    .clear-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      flex:0 0 auto;
    }

    .clear-btn{
      width:28px;
      height:28px;
      border-radius:50%;
      border:1px solid var(--clear-red-dark);
      background:radial-gradient(circle at 35% 35%, #ab3d38, var(--clear-red) 65%);
      color:transparent;
      cursor:pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 1px 2px rgba(0,0,0,.25);
      padding:0;
    }

    .clear-btn:active{
      transform:translateY(1px);
    }

    .clear-label{
      font-size:7px;
      color:var(--clear-red-text);
      letter-spacing:.6px;
      text-transform:uppercase;
      line-height:1;
    }

    .screen{
      flex:1 1 auto;
      min-height:110px;
      border:2px solid var(--screen-line-dark);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
        linear-gradient(180deg, rgba(146,173,162,.045), rgba(0,0,0,0)),
        var(--screen-bg);
      padding:8px;
      overflow:auto;
      position:relative;
    }

    .screen::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 2px,
        rgba(170,190,180,.014) 3px
      );
      opacity:.35;
    }

    .empty{
      position:relative;
      z-index:1;
      color:#8d948b;
      font-size:11px;
      text-transform:uppercase;
    }

    .msg{
      position:relative;
      z-index:1;
      margin-bottom:8px;
      padding:8px 10px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-left:6px solid var(--msg-green);
    }

    .meta{
      font-size:9px;
      color:var(--muted);
      margin-bottom:5px;
      text-transform:uppercase;
      line-height:1.25;
    }

    .text{
      font-size:15px;
      line-height:1.35;
      color:var(--text);
      word-break:break-word;
      letter-spacing:.1px;
    }

    .divider{
      margin-top:6px;
      height:1px;
      background:linear-gradient(90deg, rgba(127,179,111,.75), rgba(127,179,111,0));
    }

    .bottom{
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:7px;
      z-index:1;
    }

    .field{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .label{
      font-size:9px;
      color:#6f664f;
      text-transform:uppercase;
      margin-bottom:3px;
    }

    .input{
      width:100%;
      padding:10px 10px;
      font-family:'Orbitron', monospace;
      font-size:12px;
      color:#edf1eb;
      background:linear-gradient(180deg, #121614, #0a0d0c);
      border:2px solid #65796f;
      outline:none;
      border-radius:0;
    }

    .input::placeholder{
      color:#858d84;
    }

    .input:focus{
      border-color:#b6955d;
    }

    .actions{
      display:grid;
      grid-template-columns: 1fr 120px;
      gap:8px;
      align-items:end;
    }

    .btn{
      width:100%;
      padding:13px 12px;
      font-family:'Orbitron', monospace;
      font-size:12px;
      border:1px solid #8f7a53;
      color:#2a261f;
      background:linear-gradient(180deg, #d8be88, #b39259);
      cursor:pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    #soundBtn{
      background:linear-gradient(180deg, var(--sound-top), var(--sound-bot));
      color:#18211d;
      border:1px solid #66786f;
    }

    @media (max-width: 640px){
      .stage{
        width:100%;
        height:100%;
      }

      .device{
        width:min(100%, 392px);
        max-height:84vh;
        padding:9px;
        gap:8px;
      }

      .top{
        gap:8px;
      }

      .brand{
        font-size:18px;
      }

      .sub{
        font-size:8px;
        line-height:1.1;
      }

      .plate{
        padding:8px 9px;
      }

      .serial-plate{
        padding:7px 8px;
      }

      .serial-label{
        font-size:8px;
      }

      .serial-value{
        font-size:14px;
      }

      .dial{
        width:36px;
        height:36px;
      }

      .mid{
        padding:8px;
      }

      .bezel{
        padding:6px;
      }

      .screen-head{
        margin-bottom:4px;
      }

      .status{
        font-size:9px;
      }

      .clear-btn{
        width:24px;
        height:24px;
      }

      .clear-label{
        font-size:6px;
      }

      .screen{
        min-height:100px;
        padding:6px;
      }

      .msg{
        margin-bottom:6px;
        padding:6px 8px;
      }

      .meta{
        font-size:8px;
        margin-bottom:3px;
      }

      .text{
        font-size:14px;
      }

      .bottom{
        gap:5px;
      }

      .label{
        font-size:8px;
        margin-bottom:2px;
      }

      .input{
        padding:8px 8px;
        font-size:11px;
      }

      .actions{
        grid-template-columns: 1fr 110px;
        gap:6px;
      }

      .btn{
        padding:10px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="device-shadow"></div>

    <div class="device">
      <div class="weather"></div>

      <div class="top">
        <div class="top-left">
          <div class="plate">
            <div class="brand">NU PAGER</div>
            <div class="sub">REBEL SIGNAL NODE · STEAM-CORE COMMUNICATOR</div>
          </div>

          <div class="serial-plate">
            <div class="serial-label">Unit Serial</div>
            <div class="serial-value" id="device">BOOTING...</div>
          </div>
        </div>

        <div class="hardware">
          <div class="sensor"></div>
          <div class="dial"></div>
        </div>
      </div>

      <div class="mid">
        <div class="bezel">
          <div class="screen-head">
            <div class="status" id="status">
              <div class="dot"></div>
              CHANNEL ONLINE
            </div>

            <div class="clear-wrap">
              <button class="clear-btn" id="clearBtn" aria-label="Clear messages">CLEAR</button>
              <div class="clear-label">CLEAR</div>
            </div>
          </div>

          <div class="screen" id="screen">
            <div class="empty" id="emptyState">NO INCOMING SIGNAL</div>
          </div>
        </div>
      </div>

      <div class="bottom">
        <div class="field">
          <div class="label">Transmit To</div>
          <input class="input" id="to" placeholder="NP-0001">
        </div>

        <div class="field">
          <div class="label">Message Payload</div>
          <input class="input" id="msg" maxlength="80" placeholder="ENTER MESSAGE">
        </div>

        <div class="actions">
          <button class="btn" id="send" disabled>TRANSMIT</button>
          <button class="btn" id="soundBtn" type="button">SOUND ON</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
      authDomain: "nu-pager-network.firebaseapp.com",
      databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
      projectId: "nu-pager-network",
      storageBucket: "nu-pager-network.firebasestorage.app",
      messagingSenderId: "1037097080836",
      appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const toInput = document.getElementById("to");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clearBtn");
    const soundBtn = document.getElementById("soundBtn");
    const screen = document.getElementById("screen");
    const deviceBox = document.getElementById("device");
    const statusBox = document.getElementById("status");
    const emptyState = document.getElementById("emptyState");

    let deviceID = localStorage.getItem("deviceID") || "";

    let audioCtx = null;
    let masterGain = null;
    let audioReady = false;
    let bootPlayed = false;

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function initAudio(){
      try{
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if(!AudioContextClass) {
          if(soundBtn) soundBtn.innerText = "NO AUDIO";
          return false;
        }

        if(!audioCtx){
          audioCtx = new AudioContextClass();
          masterGain = audioCtx.createGain();
          masterGain.gain.value = 0.18;
          masterGain.connect(audioCtx.destination);
        }

        if(audioCtx.state === "suspended"){
          await audioCtx.resume();
        }

        audioReady = true;

        if(soundBtn){
          soundBtn.innerText = "SOUND OK";
        }

        if(!bootPlayed){
          bootPlayed = true;
          await playBootSound();
        }

        return true;
      }catch(e){
        console.log("audio init failed", e);
        if(soundBtn) soundBtn.innerText = "NO AUDIO";
        return false;
      }
    }

    async function beep({
      frequency = 880,
      duration = 0.08,
      type = "square",
      volume = 0.18
    } = {}){
      if(!audioReady || !audioCtx || !masterGain) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration + 0.02);
    }

    async function playBootSound(){
      await beep({ frequency: 620, duration: 0.06, type: "triangle", volume: 0.20 });
      await sleep(70);
      await beep({ frequency: 880, duration: 0.07, type: "triangle", volume: 0.18 });
    }

    async function playSendSound(){
      await beep({ frequency: 980, duration: 0.06, type: "square", volume: 0.20 });
    }

    async function playReceiveSound(){
      await beep({ frequency: 720, duration: 0.05, type: "square", volume: 0.18 });
      await sleep(80);
      await beep({ frequency: 920, duration: 0.05, type: "square", volume: 0.18 });
    }

    async function playClearSound(){
      await beep({ frequency: 520, duration: 0.06, type: "sawtooth", volume: 0.18 });
    }

    async function registerDevice(){
      if(!deviceID){
        const counterRef = ref(db, "deviceCounter");
        const result = await runTransaction(counterRef, current => (current || 0) + 1);
        const number = result.snapshot.val();
        deviceID = "NP-" + String(number).padStart(4, "0");
        localStorage.setItem("deviceID", deviceID);
      }

      deviceBox.innerText = deviceID;
      statusBox.innerHTML = '<div class="dot"></div>CHANNEL ONLINE';
      sendBtn.disabled = false;
    }

    function showEmptyIfNeeded(){
      if(screen.querySelector(".msg")){
        if(emptyState) emptyState.style.display = "none";
      }else{
        if(emptyState) emptyState.style.display = "block";
      }
    }

    function showMessage(msg){
      if(emptyState) emptyState.style.display = "none";

      const wrapper = document.createElement("div");
      wrapper.className = "msg";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerText = "INCOMING FROM : " + (msg.from || "UNKNOWN");

      const text = document.createElement("div");
      text.className = "text";
      text.innerText = msg.text || "";

      const divider = document.createElement("div");
      divider.className = "divider";

      wrapper.appendChild(meta);
      wrapper.appendChild(text);
      wrapper.appendChild(divider);
      screen.appendChild(wrapper);
      screen.scrollTop = screen.scrollHeight;
    }

    function clearMessages(){
      screen.querySelectorAll(".msg").forEach(el => el.remove());
      showEmptyIfNeeded();
      statusBox.innerHTML = '<div class="dot"></div>LOG PURGED';
      setTimeout(() => {
        statusBox.innerHTML = '<div class="dot"></div>CHANNEL ONLINE';
      }, 1000);
    }

    await registerDevice();
    showEmptyIfNeeded();

    if(soundBtn){
      soundBtn.onclick = async () => {
        await initAudio();
      };
    }

    sendBtn.onclick = async () => {
      await initAudio();

      const to = toInput.value.trim().toUpperCase();
      const text = msgInput.value.trim();

      if(!to){
        alert("ENTER TARGET DEVICE ID");
        return;
      }

      if(!text){
        return;
      }

      sendBtn.disabled = true;
      statusBox.innerHTML = '<div class="dot"></div>TRANSMITTING...';

      try{
        await push(ref(db, "messages/" + to), {
          from: deviceID,
          text: text,
          time: Date.now()
        });

        await playSendSound();

        msgInput.value = "";
        statusBox.innerHTML = '<div class="dot"></div>TRANSMISSION SENT';

        setTimeout(() => {
          statusBox.innerHTML = '<div class="dot"></div>CHANNEL ONLINE';
        }, 1200);
      }catch(err){
        console.error(err);
        alert("TRANSMISSION FAILED");
        statusBox.innerHTML = '<div class="dot"></div>CHANNEL ERROR';
      }finally{
        sendBtn.disabled = false;
      }
    };

    clearBtn.onclick = async () => {
      await initAudio();
      clearMessages();
      await playClearSound();
    };

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendBtn.click();
      }
    });

    onChildAdded(ref(db, "messages/" + deviceID), async (data) => {
      const msg = data.val();
      showMessage(msg);
      statusBox.innerHTML = '<div class="dot"></div>NEW INCOMING SIGNAL';
      await playReceiveSound();
    });
  </script>
</body>
</html>
