<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NU-PAGER</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
}

#pager{
  width:320px;
  background:#e9e9e9;
  border-radius:25px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

#title{
  text-align:center;
  font-weight:bold;
  letter-spacing:2px;
}

#device{
  text-align:center;
  font-size:12px;
  margin-bottom:10px;
}

#screen{
  background:#b7ffb7;
  border-radius:10px;
  padding:10px;
  height:120px;
  font-size:14px;
  overflow:auto;
}

input{
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div id="pager">

<div id="title">NU-PAGER</div>
<div id="device">DEVICE : NP-0001</div>

<div id="screen">
Booting NU-PAGER 1999...<br>
Ready.
</div>

<input id="to" placeholder="send to device id">
<input id="name" placeholder="your name">
<input id="msg" placeholder="message (80 chars max)">

<button onclick="send()">SEND</button>

</div>

<script>
function send(){
  const to=document.getElementById("to").value
  const name=document.getElementById("name").value
  const msg=document.getElementById("msg").value

  const screen=document.getElementById("screen")

  const time=new Date().toLocaleTimeString()

  screen.innerHTML += "<br>["+time+"] "+name+" : "+msg
}
</script>

</body>
</html>
