<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Pager Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0d0c;
      --panel:#121614;
      --panel-2:#171c19;
      --line:#799d90;
      --line-soft:#4f675e;
      --text:#eef3ec;
      --muted:#9aa395;
      --accent:#b6955d;
      --accent-soft:#74603d;
      --warn:#d5b06c;
      --message-bg:#181d1b;
      --message-border:#d0b170;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{
      background:
        linear-gradient(rgba(255,255,255,0.012), rgba(255,255,255,0.008)),
        radial-gradient(circle at top, rgba(182,149,93,0.035), transparent 28%),
        radial-gradient(circle at bottom, rgba(121,157,144,0.025), transparent 34%),
        var(--bg);
      color:var(--text);
      font-family:'Orbitron', monospace;
      padding:4px;
      letter-spacing:0.3px;
      position:relative;
      overflow:hidden;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 2px,
        rgba(150,165,150,0.015) 3px
      );
      opacity:0.28;
      mix-blend-mode:screen;
    }

    .shell{
      width:100%;
      max-width:720px;
      height:calc(100dvh - 8px);
      margin:0 auto;
      padding:8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.006)),
        linear-gradient(135deg, rgba(182,149,93,0.025), transparent 30%),
        var(--panel);
      border:1px solid rgba(182,149,93,0.2);
      border-radius:10px;
      position:relative;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-shadow:
        inset 0 0 0 1px rgba(121,157,144,0.05),
        0 0 0 1px rgba(0,0,0,0.35);
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:6px;
      border:1px solid rgba(182,149,93,0.12);
      border-radius:7px;
      pointer-events:none;
    }

    .topbar{
      display:flex;
      flex-direction:column;
      gap:5px;
      margin-bottom:6px;
      flex:0 0 auto;
    }

    .title{
      font-size:16px;
      font-weight:600;
      color:#98c9b7;
      letter-spacing:0.7px;
      line-height:1.05;
    }

    .sub{
      font-size:8px;
      line-height:1.2;
      color:var(--accent);
      text-transform:uppercase;
      opacity:0.94;
    }

    .unit{
      border:1px solid rgba(121,157,144,0.36);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.004)),
        var(--panel-2);
      padding:7px 8px;
    }

    .unit-label{
      font-size:8px;
      color:var(--accent);
      margin-bottom:4px;
      text-transform:uppercase;
    }

    .unit-id{
      font-size:14px;
      color:#a8d6c3;
      line-height:1.1;
    }

    .status{
      margin:4px 0 6px;
      color:var(--warn);
      font-size:10px;
      min-height:14px;
      display:flex;
      align-items:center;
      gap:6px;
      flex:0 0 auto;
    }

    .blinker{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#8fb29f;
      opacity:0.85;
      animation:blink 1.4s infinite;
      flex:0 0 auto;
    }

    @keyframes blink{
      0%,100%{opacity:0.25}
      50%{opacity:0.9}
    }

    .screen-frame{
      flex:1 1 auto;
      min-height:0;
      border:1px solid rgba(182,149,93,0.2);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.008), rgba(255,255,255,0.003)),
        #0c100e;
      padding:6px;
      margin-bottom:6px;
      overflow:hidden;
    }

    #screen{
      height:100%;
      width:100%;
      min-height:0;
      overflow:auto;
      border:2px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(121,157,144,0.018), rgba(182,149,93,0.015)),
        #0b0e0d;
      padding:8px;
    }

    .empty{
      color:var(--muted);
      font-size:10px;
      opacity:0.82;
    }

    .msg{
      margin-bottom:10px;
      padding:8px 10px;
      background:var(--message-bg);
      border-left:4px solid var(--message-border);
    }

    .meta{
      font-size:9px;
      color:var(--accent);
      margin-bottom:5px;
      text-transform:uppercase;
      line-height:1.25;
    }

    .text{
      font-size:16px;
      color:var(--text);
      line-height:1.4;
      word-break:break-word;
      letter-spacing:0.2px;
    }

    .divider{
      height:1px;
      margin-top:8px;
      background:linear-gradient(90deg, rgba(182,149,93,0.6), rgba(182,149,93,0));
      opacity:0.65;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:5px;
      flex:0 0 auto;
    }

    .label{
      font-size:8px;
      color:var(--accent);
      margin-bottom:3px;
      text-transform:uppercase;
      line-height:1.1;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    input{
      width:100%;
      padding:9px 8px;
      background:#0b0e0d;
      color:var(--text);
      border:1px solid var(--line-soft);
      outline:none;
      font-family:'Orbitron', monospace;
      font-size:12px;
      min-height:0;
    }

    input::placeholder{
      color:#7f8678;
    }

    input:focus{
      border-color:var(--accent);
      background:#0d110f;
    }

    .actions{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:1px;
    }

    button{
      padding:10px 12px;
      min-width:120px;
      border:1px solid rgba(182,149,93,0.45);
      background:linear-gradient(180deg, #b89a63, #8a7348);
      color:#111;
      font-family:'Orbitron', monospace;
      font-size:11px;
      cursor:pointer;
    }

    button:disabled{
      opacity:0.55;
      cursor:not-allowed;
    }

    .hint{
      font-size:8px;
      color:var(--muted);
      text-transform:uppercase;
    }

    @media (min-width: 700px){
      .shell{
        height:min(100dvh - 8px, 900px);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title">NU PAGER</div>
      <div class="sub">REBEL SIGNAL NODE · STEAM-CORE COMMUNICATOR</div>

      <div class="unit">
        <div class="unit-label">UNIT IDENTIFICATION</div>
        <div class="unit-id" id="device">BOOTING...</div>
      </div>
    </div>

    <div class="status" id="status">
      <span class="blinker"></span>
      LINKING TO NETWORK...
    </div>

    <div class="screen-frame">
      <div id="screen">
        <div class="empty" id="emptyState">NO INCOMING SIGNAL</div>
      </div>
    </div>

    <div class="controls">
      <div class="field">
        <div class="label">TRANSMIT TO</div>
        <input id="to" placeholder="NP-0001">
      </div>

      <div class="field">
        <div class="label">MESSAGE PAYLOAD</div>
        <input id="msg" maxlength="80" placeholder="ENTER MESSAGE">
      </div>

      <div class="actions">
        <button id="send" disabled>TRANSMIT</button>
        <div class="hint">DIRECT DEVICE MESSAGE · PRIVATE CHANNEL</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
      authDomain: "nu-pager-network.firebaseapp.com",
      databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
      projectId: "nu-pager-network",
      storageBucket: "nu-pager-network.firebasestorage.app",
      messagingSenderId: "1037097080836",
      appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const toInput = document.getElementById("to");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const screen = document.getElementById("screen");
    const deviceBox = document.getElementById("device");
    const statusBox = document.getElementById("status");
    const emptyState = document.getElementById("emptyState");

    let deviceID = localStorage.getItem("deviceID") || "";

    async function registerDevice(){
      if(!deviceID){
        const counterRef = ref(db, "deviceCounter");
        const result = await runTransaction(counterRef, current => (current || 0) + 1);
        const number = result.snapshot.val();
        deviceID = "NP-" + String(number).padStart(4, "0");
        localStorage.setItem("deviceID", deviceID);
      }

      deviceBox.innerText = deviceID;
      statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ONLINE';
      sendBtn.disabled = false;
    }

    function showMessage(msg){
      if(emptyState){
        emptyState.style.display = "none";
      }

      const wrapper = document.createElement("div");
      wrapper.className = "msg";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerText = "INCOMING FROM : " + (msg.from || "UNKNOWN");

      const text = document.createElement("div");
      text.className = "text";
      text.innerText = msg.text || "";

      const divider = document.createElement("div");
      divider.className = "divider";

      wrapper.appendChild(meta);
      wrapper.appendChild(text);
      wrapper.appendChild(divider);
      screen.appendChild(wrapper);
      screen.scrollTop = screen.scrollHeight;
    }

    await registerDevice();

    sendBtn.onclick = async () => {
      const to = toInput.value.trim().toUpperCase();
      const text = msgInput.value.trim();

      if(!to){
        alert("ENTER TARGET DEVICE ID");
        return;
      }

      if(!text){
        return;
      }

      sendBtn.disabled = true;
      statusBox.innerHTML = '<span class="blinker"></span>TRANSMITTING...';

      try{
        await push(ref(db, "messages/" + to), {
          from: deviceID,
          text: text,
          time: Date.now()
        });

        msgInput.value = "";
        statusBox.innerHTML = '<span class="blinker"></span>TRANSMISSION SENT';

        setTimeout(() => {
          statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ONLINE';
        }, 1200);
      }catch(err){
        console.error(err);
        alert("TRANSMISSION FAILED");
        statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ERROR';
      }finally{
        sendBtn.disabled = false;
      }
    };

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendBtn.click();
      }
    });

    onChildAdded(ref(db, "messages/" + deviceID), (data) => {
      const msg = data.val();
      showMessage(msg);
      statusBox.innerHTML = '<span class="blinker"></span>NEW INCOMING SIGNAL';
    });
  </script>
</body>
</html>
