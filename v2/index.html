<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NU-PAGER v2.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --direct:#60ff88;
  --all:#ffd84a;
  --screen-color:#60ff88;
  --radar-glow:rgba(100,255,140,.30);
  --radar-line:rgba(100,255,140,.95);
  --radar-mid:rgba(90,255,140,.55);
  --radar-fade:rgba(60,255,110,0);
}

body{
  margin:0;
  background:#0b0f14;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:monospace;
  color:#9cff9c;
}

.device{
  width:340px;
  background:#b8b1a4;
  border-radius:16px;
  padding:14px;
  box-shadow:0 0 30px rgba(0,0,0,.6);
  border:3px solid #6d665b;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  color:#222;
  font-weight:bold;
  margin-bottom:10px;
}

.header-left{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.title{
  font-size:18px;
  font-weight:900;
}

.sub{
  font-size:11px;
  opacity:.8;
}

.device-id{
  font-size:18px;
  font-weight:900;
}

.screen{
  background:#041008;
  border-radius:8px;
  padding:10px;
  height:145px;
  border:2px solid #2f3c2f;
  box-shadow:inset 0 0 12px rgba(0,255,120,.08);
  overflow:auto;
  color:var(--screen-color);
}

.screen-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  color:var(--screen-color);
}

.signal-bars{
  letter-spacing:1px;
}

.log-line{
  margin-bottom:8px;
  line-height:1.25;
  white-space:pre-wrap;
  word-break:break-word;
}

.from{
  color:var(--screen-color);
  font-size:12px;
  display:block;
  margin-bottom:2px;
}

.inputbox{
  margin-top:8px;
  width:100%;
  box-sizing:border-box;
  background:#1a1f1c;
  border:none;
  padding:10px;
  color:#aaffaa;
  border-radius:6px;
  font-family:monospace;
  font-size:16px;
}

.controls{
  margin-top:8px;
  display:flex;
  gap:8px;
}

button{
  border:none;
  border-radius:6px;
  font-weight:bold;
  font-family:monospace;
}

.clear{
  flex:1;
  padding:12px 8px;
  background:#c33;
  color:#fff;
}

.send{
  flex:1;
  padding:12px 8px;
  background:#bfa06a;
  color:#111;
}

.sound{
  flex:1;
  padding:12px 8px;
  background:#8ea3a8;
  color:#111;
}

.status{
  margin-top:8px;
  color:#222;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.online{
  background:#1f4;
  height:12px;
  width:12px;
  border-radius:50%;
  display:inline-block;
}

.mode-row{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
}

.mode-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  min-width:72px;
}

.mode-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  border:2px solid rgba(0,0,0,.22);
  background:var(--screen-color);
  box-shadow:0 0 8px rgba(0,0,0,.25), inset 0 1px 4px rgba(255,255,255,.25);
  padding:0;
}

.mode-label{
  font-size:12px;
  color:#222;
  font-weight:bold;
}

.target-note{
  color:#222;
  margin-top:6px;
  font-size:12px;
}

.radar{
  margin-top:12px;
  width:100%;
  aspect-ratio:1/1;
  background:
    radial-gradient(circle at center, rgba(0,255,100,.04) 0%, rgba(0,0,0,0) 60%),
    #000;
  border-radius:50%;
  border:4px solid var(--screen-color);
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 0 20px rgba(0,255,100,.08);
}

.radar::before,
.radar::after{
  content:"";
  position:absolute;
  background:color-mix(in srgb, var(--screen-color) 35%, transparent);
}

.radar::before{
  width:2px;
  height:100%;
  left:50%;
  top:0;
  transform:translateX(-50%);
}

.radar::after{
  height:2px;
  width:100%;
  left:0;
  top:50%;
  transform:translateY(-50%);
}

.radar-ring{
  position:absolute;
  border:1px solid color-mix(in srgb, var(--screen-color) 30%, transparent);
  border-radius:50%;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.r1{ width:42px; height:42px; }
.r2{ width:84px; height:84px; }
.r3{ width:126px; height:126px; }
.r4{ width:168px; height:168px; }

.radar-center{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:var(--screen-color);
  font-size:10px;
  z-index:3;
  text-align:center;
  pointer-events:none;
}

.sweep{
  position:absolute;
  width:50%;
  height:2px;
  left:50%;
  top:50%;
  transform-origin:left center;
  animation:sweep 3.2s linear infinite;
  z-index:2;
}

.sweep::before{
  content:"";
  position:absolute;
  left:0;
  top:-1px;
  width:100%;
  height:4px;
  background:linear-gradient(90deg,
    var(--radar-line) 0%,
    var(--radar-mid) 35%,
    rgba(255,255,255,.08) 58%,
    var(--radar-fade) 100%);
  box-shadow:
    0 0 6px var(--radar-glow),
    0 0 14px rgba(255,255,255,.08);
  border-radius:3px;
}

@keyframes sweep{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

.radar-dot{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#79a987;
  border:1px solid #d6e9cf;
  box-shadow:0 0 4px rgba(160,255,190,.15);
  cursor:pointer;
  z-index:4;
  transform:translate(-50%,-50%);
}

.radar-dot.selected{
  background:var(--screen-color);
  box-shadow:
    0 0 6px color-mix(in srgb, var(--screen-color) 90%, white 10%),
    0 0 14px color-mix(in srgb, var(--screen-color) 50%, transparent);
}

.radar-dot.self{
  background:#a0ffd0;
  border-color:#fff;
}

.radar-dot-label{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  font-size:9px;
  color:var(--screen-color);
  white-space:nowrap;
  pointer-events:none;
}

.radar-label{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  z-index:3;
  color:var(--screen-color);
  font-size:12px;
  letter-spacing:1px;
  opacity:.85;
  pointer-events:none;
}

@media (max-width:400px){
  .device{ width:92vw; }
}
</style>
</head>
<body>

<div class="device">

  <div class="header">
    <div class="header-left">
      <div class="title">NU-PAGER</div>
      <div class="sub">REBEL SIGNAL DEVICE</div>
    </div>
    <div class="device-id" id="deviceId">NP-0000</div>
  </div>

  <div class="screen" id="screen">
    <div class="screen-header">
      <span id="screenTarget">CHANNEL : SELECT TARGET</span>
      <span class="signal-bars">▂▃▄▅▆</span>
    </div>
  </div>

  <input id="msg" class="inputbox" placeholder="ENTER MESSAGE...">

  <div class="controls">
    <button id="clearBtn" class="clear">CLEAR</button>
    <button id="sendBtn" class="send">SEND</button>
    <button id="soundBtn" class="sound">SOUND ON</button>
  </div>

  <div class="status">
    ONLINE <span class="online"></span>
  </div>

  <div class="mode-row">
    <div class="mode-wrap">
      <button id="modeBtn" class="mode-btn" title="MODE"></button>
      <div class="mode-label" id="modeLabel">DIRECT</div>
    </div>
  </div>

  <div class="target-note" id="targetNote">TARGET LOCK : NONE</div>

  <div class="radar" id="radar">
    <div class="radar-ring r1"></div>
    <div class="radar-ring r2"></div>
    <div class="radar-ring r3"></div>
    <div class="radar-ring r4"></div>
    <div class="sweep"></div>
    <div class="radar-center" id="radarCenter">YOU</div>
    <div class="radar-label">RADAR CONTACT</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, runTransaction, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCoBm1A-OXNYIgX6TXAXAovkb5P_hJs4",
  authDomain: "nu-pager-network.firebaseapp.com",
  databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
  projectId: "nu-pager-network",
  storageBucket: "nu-pager-network.firebasestorage.app",
  messagingSenderId: "1037097080836",
  appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const devicesRef = ref(db, "devices");

const input = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");
const soundBtn = document.getElementById("soundBtn");
const modeBtn = document.getElementById("modeBtn");
const modeLabel = document.getElementById("modeLabel");
const screen = document.getElementById("screen");
const deviceBox = document.getElementById("deviceId");
const screenTarget = document.getElementById("screenTarget");
const targetNote = document.getElementById("targetNote");
const radar = document.getElementById("radar");
const radarCenter = document.getElementById("radarCenter");

let soundEnabled = true;
let audioCtx = null;
let deviceID = localStorage.getItem("deviceID");
let selectedTarget = null;
let devicesMap = {};
let mode = "DIRECT";

function unlockAudio(){
  if(!audioCtx){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioCtx();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

document.addEventListener("touchstart", unlockAudio, { once:true });
document.addEventListener("click", unlockAudio, { once:true });

function beep(freq=880, duration=80, volume=0.03){
  if(!soundEnabled) return;
  unlockAudio();
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration/1000);
}

function radarBeep(){
  beep(700, 45, 0.012);
}

function sendBeep(){
  beep(950, 80, 0.03);
}

function receiveBeep(){
  beep(620, 120, 0.035);
}

function applyModeUI(){
  const root = document.documentElement;

  if(mode === "ALL"){
    root.style.setProperty("--screen-color", "#ffd84a");
    root.style.setProperty("--radar-glow", "rgba(255,216,74,.35)");
    root.style.setProperty("--radar-line", "rgba(255,216,74,.95)");
    root.style.setProperty("--radar-mid", "rgba(255,216,74,.55)");
    root.style.setProperty("--radar-fade", "rgba(255,216,74,0)");
    modeLabel.textContent = "ALL";
    screenTarget.textContent = "CHANNEL : ALL";
    targetNote.textContent = "TARGET LOCK : BROADCAST";
  } else {
    root.style.setProperty("--screen-color", "#60ff88");
    root.style.setProperty("--radar-glow", "rgba(100,255,140,.30)");
    root.style.setProperty("--radar-line", "rgba(100,255,140,.95)");
    root.style.setProperty("--radar-mid", "rgba(90,255,140,.55)");
    root.style.setProperty("--radar-fade", "rgba(60,255,110,0)");
    modeLabel.textContent = "DIRECT";
    screenTarget.textContent = selectedTarget ? ("CHANNEL : " + selectedTarget) : "CHANNEL : SELECT TARGET";
    targetNote.textContent = selectedTarget ? ("TARGET LOCK : " + selectedTarget) : "TARGET LOCK : NONE";
  }
}

async function registerDevice(){
  if(!deviceID){
    const counterRef = ref(db, "deviceCounter");
    const result = await runTransaction(counterRef, current => (current || 0) + 1);
    const number = result.snapshot.val();
    deviceID = "NP-" + String(number).padStart(4, "0");
    localStorage.setItem("deviceID", deviceID);
  }
  deviceBox.textContent = deviceID;
  radarCenter.textContent = deviceID;
}

async function registerPresence(){
  const myDeviceRef = ref(db, "devices/" + deviceID);
  const existing = await get(myDeviceRef);
  const old = existing.val() || {};
  await set(myDeviceRef, {
    id: deviceID,
    x: old.x ?? 50,
    y: old.y ?? 50,
    updatedAt: Date.now()
  });
}

function addMessageToScreen(from, text){
  const line = document.createElement("div");
  line.className = "log-line";
  line.innerHTML = '<span class="from">' + from + '</span>' + text;
  screen.appendChild(line);
  screen.scrollTop = screen.scrollHeight;
}

function setTarget(target){
  selectedTarget = target;
  if(mode === "DIRECT"){
    screenTarget.textContent = "CHANNEL : " + target;
    targetNote.textContent = "TARGET LOCK : " + target;
  }

  document.querySelectorAll(".radar-dot").forEach(dot => {
    if(dot.dataset.id === target){
      dot.classList.add("selected");
    }else{
      dot.classList.remove("selected");
    }
  });

  radarBeep();
}

function renderRadar(devices){
  document.querySelectorAll(".radar-dot").forEach(el => el.remove());

  Object.values(devices).forEach(dev => {
    if(!dev || !dev.id) return;

    const dot = document.createElement("div");
    dot.className = "radar-dot";
    dot.dataset.id = dev.id;
    dot.style.left = (dev.x || 50) + "%";
    dot.style.top = (dev.y || 50) + "%";

    if(dev.id === deviceID){
      dot.classList.add("self");
    }

    if(selectedTarget === dev.id){
      dot.classList.add("selected");
    }

    const label = document.createElement("div");
    label.className = "radar-dot-label";
    label.textContent = dev.id;

    dot.appendChild(label);

    if(dev.id !== deviceID){
      dot.addEventListener("click", () => {
        setTarget(dev.id);
      });
    }

    radar.appendChild(dot);
  });
}

await registerDevice();
await registerPresence();
applyModeUI();

clearBtn.addEventListener("click", () => {
  input.value = "";
  screen.innerHTML = `
    <div class="screen-header">
      <span id="screenTarget">${mode === "ALL" ? "CHANNEL : ALL" : (selectedTarget ? "CHANNEL : " + selectedTarget : "CHANNEL : SELECT TARGET")}</span>
      <span class="signal-bars">▂▃▄▅▆</span>
    </div>
  `;
});

soundBtn.addEventListener("click", () => {
  unlockAudio();
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? "SOUND ON" : "SOUND OFF";
  if(soundEnabled) beep(700, 120, 0.025);
});

modeBtn.addEventListener("click", () => {
  unlockAudio();
  mode = mode === "DIRECT" ? "ALL" : "DIRECT";
  applyModeUI();
  radarBeep();
});

sendBtn.addEventListener("click", () => {
  unlockAudio();

  const text = input.value.trim();
  if(!text) return;

  if(mode === "DIRECT" && !selectedTarget){
    alert("LOCK TARGET ON RADAR FIRST");
    return;
  }

  const target = mode === "ALL" ? "ALL" : selectedTarget;

  push(messagesRef, {
    from: deviceID,
    to: target,
    mode: mode,
    text: text,
    time: Date.now()
  });

  addMessageToScreen("TO " + target, text);
  input.value = "";
  sendBeep();
});

onValue(devicesRef, (snapshot) => {
  const raw = snapshot.val() || {};
  const ids = Object.keys(raw).sort();
  const total = Math.max(ids.length, 1);

  devicesMap = {};
  ids.forEach((id, index) => {
    if(id === deviceID){
      devicesMap[id] = { id, x:50, y:50 };
      return;
    }

    const angle = (index / total) * Math.PI * 2;
    const radius = 28 + (index % 2) * 10;
    const x = 50 + Math.cos(angle) * radius;
    const y = 50 + Math.sin(angle) * radius;

    devicesMap[id] = { id, x, y };
  });

  if(!devicesMap[deviceID]){
    devicesMap[deviceID] = { id:deviceID, x:50, y:50 };
  }

  renderRadar(devicesMap);
});

onChildAdded(messagesRef, (snapshot) => {
  const msg = snapshot.val();
  if(!msg) return;

  if(msg.to === "ALL" || msg.to === deviceID){
    if(msg.from === deviceID && msg.to !== "ALL") return;
    addMessageToScreen(msg.from || "UNKNOWN", msg.text || "");
    if(msg.from !== deviceID){
      receiveBeep();
    }
  }
});
</script>

</body>
</html>
