<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Pager Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070808;
      --panel:#0e1111;
      --line:#6bffb0;
      --line-soft:#3ccf84;
      --text:#d8ffe7;
      --accent:#ffd166;
      --danger:#ff8c69;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,209,102,0.08), transparent 25%),
        radial-gradient(circle at bottom, rgba(92,255,154,0.06), transparent 30%),
        var(--bg);
      color:var(--text);
      font-family:'Orbitron', monospace;
      padding:22px;
      letter-spacing:0.4px;
      position:relative;
      overflow-x:hidden;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.00) 0px,
        rgba(255,255,255,0.00) 2px,
        rgba(92,255,154,0.035) 3px
      );
      mix-blend-mode:screen;
      opacity:0.5;
    }

    .shell{
      max-width:760px;
      margin:0 auto;
      border:1px solid rgba(255,209,102,0.25);
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow:
        0 0 0 1px rgba(92,255,154,0.08) inset,
        0 0 24px rgba(92,255,154,0.06),
        0 0 60px rgba(255,209,102,0.03);
      padding:18px;
      border-radius:12px;
      position:relative;
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:8px;
      border:1px solid rgba(255,209,102,0.14);
      border-radius:8px;
      pointer-events:none;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:16px;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .title{
      color:var(--line);
      font-size:28px;
      font-weight:600;
      text-shadow:0 0 8px rgba(92,255,154,0.28);
    }

    .sub{
      color:var(--accent);
      font-size:11px;
      opacity:0.9;
    }

    .unit{
      border:1px solid rgba(92,255,154,0.45);
      color:var(--text);
      padding:10px 12px;
      min-width:210px;
      text-align:left;
      background:rgba(10,18,15,0.8);
      box-shadow:0 0 12px rgba(92,255,154,0.08) inset;
    }

    .unit-label{
      font-size:11px;
      color:var(--accent);
      margin-bottom:4px;
      opacity:0.9;
    }

    .unit-id{
      font-size:20px;
      color:var(--line);
      text-shadow:0 0 8px rgba(92,255,154,0.18);
    }

    .status{
      margin:10px 0 14px;
      color:var(--accent);
      font-size:12px;
      min-height:18px;
    }

    .screen-frame{
      border:1px solid rgba(255,209,102,0.28);
      padding:10px;
      background:rgba(5,8,8,0.75);
      box-shadow:
        0 0 0 1px rgba(92,255,154,0.12) inset,
        0 0 24px rgba(92,255,154,0.04) inset;
      margin-bottom:16px;
    }

    #screen{
      border:2px solid var(--line-soft);
      min-height:360px;
      max-height:420px;
      overflow:auto;
      padding:14px;
      background:
        linear-gradient(180deg, rgba(92,255,154,0.03), rgba(255,209,102,0.02)),
        #060808;
      box-shadow:
        inset 0 0 18px rgba(92,255,154,0.08),
        0 0 18px rgba(92,255,154,0.08);
    }

    .empty{
      color:#87cfa8;
      opacity:0.7;
      font-size:13px;
    }

    .msg{
      border-left:3px solid var(--accent);
      padding:8px 10px;
      margin-bottom:12px;
      background:rgba(255,209,102,0.04);
    }

    .meta{
      color:var(--accent);
      font-size:12px;
      margin-bottom:6px;
    }

    .text{
      color:var(--text);
      font-size:15px;
      line-height:1.45;
      word-break:break-word;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .label{
      font-size:11px;
      color:var(--accent);
      margin-bottom:4px;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    input{
      width:100%;
      padding:14px 12px;
      background:#050707;
      color:var(--text);
      border:1px solid var(--line-soft);
      outline:none;
      font-family:'Orbitron', monospace;
      font-size:15px;
      box-shadow:inset 0 0 10px rgba(92,255,154,0.05);
    }

    input::placeholder{
      color:#7a8f83;
    }

    input:focus{
      border-color:var(--accent);
      box-shadow:
        0 0 0 1px rgba(255,209,102,0.25),
        inset 0 0 10px rgba(92,255,154,0.08);
    }

    .actions{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:4px;
    }

    button{
      padding:14px 18px;
      min-width:150px;
      border:none;
      cursor:pointer;
      font-family:'Orbitron', monospace;
      font-size:15px;
      background:linear-gradient(180deg, #ffe08d, var(--accent));
      color:#151515;
      box-shadow:
        0 0 12px rgba(255,209,102,0.18),
        inset 0 0 10px rgba(255,255,255,0.15);
    }

    button:disabled{
      opacity:0.55;
      cursor:not-allowed;
    }

    .hint{
      color:#8db89c;
      font-size:12px;
    }

    .blinker{
      display:inline-block;
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--line);
      box-shadow:0 0 10px rgba(92,255,154,0.5);
      animation:blink 1.2s infinite;
      margin-right:8px;
      vertical-align:middle;
    }

    @keyframes blink{
      0%, 100% { opacity:0.25; transform:scale(0.9); }
      50% { opacity:1; transform:scale(1.05); }
    }

    @media (max-width:640px){
      .topbar{
        flex-direction:column;
      }

      .unit{
        width:100%;
        min-width:unset;
      }

      .title{
        font-size:22px;
      }

      #screen{
        min-height:320px;
      }

      button{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title-wrap">
        <div class="title">NU PAGER</div>
        <div class="sub">REBEL SIGNAL NODE · STEAM-CORE COMMUNICATOR</div>
      </div>

      <div class="unit">
        <div class="unit-label">UNIT IDENTIFICATION</div>
        <div class="unit-id" id="device">BOOTING...</div>
      </div>
    </div>

    <div class="status" id="status"><span class="blinker"></span>LINKING TO NETWORK...</div>

    <div class="screen-frame">
      <div id="screen">
        <div class="empty" id="emptyState">NO INCOMING SIGNAL</div>
      </div>
    </div>

    <div class="controls">
      <div class="field">
        <div class="label">TRANSMIT TO</div>
        <input id="to" placeholder="NP-0001">
      </div>

      <div class="field">
        <div class="label">MESSAGE PAYLOAD</div>
        <input id="msg" maxlength="80" placeholder="ENTER MESSAGE">
      </div>

      <div class="actions">
        <button id="send" disabled>TRANSMIT</button>
        <div class="hint">DIRECT DEVICE MESSAGE · PRIVATE CHANNEL</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
      authDomain: "nu-pager-network.firebaseapp.com",
      databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
      projectId: "nu-pager-network",
      storageBucket: "nu-pager-network.firebasestorage.app",
      messagingSenderId: "1037097080836",
      appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const toInput = document.getElementById("to");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const screen = document.getElementById("screen");
    const deviceBox = document.getElementById("device");
    const statusBox = document.getElementById("status");
    const emptyState = document.getElementById("emptyState");

    let deviceID = localStorage.getItem("deviceID") || "";

    async function registerDevice(){
      if(!deviceID){
        const counterRef = ref(db, "deviceCounter");
        const result = await runTransaction(counterRef, current => (current || 0) + 1);
        const number = result.snapshot.val();
        deviceID = "NP-" + String(number).padStart(4, "0");
        localStorage.setItem("deviceID", deviceID);
      }

      deviceBox.innerText = deviceID;
      statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ONLINE';
      sendBtn.disabled = false;
    }

    function showMessage(msg){
      if(emptyState) emptyState.style.display = "none";

      const wrapper = document.createElement("div");
      wrapper.className = "msg";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerText = "INCOMING FROM : " + (msg.from || "UNKNOWN");

      const text = document.createElement("div");
      text.className = "text";
      text.innerText = msg.text || "";

      wrapper.appendChild(meta);
      wrapper.appendChild(text);
      screen.appendChild(wrapper);
      screen.scrollTop = screen.scrollHeight;
    }

    await registerDevice();

    sendBtn.onclick = async () => {
      const to = toInput.value.trim().toUpperCase();
      const text = msgInput.value.trim();

      if(!to){
        alert("ENTER TARGET DEVICE ID");
        return;
      }

      if(!text){
        return;
      }

      sendBtn.disabled = true;
      statusBox.innerHTML = '<span class="blinker"></span>TRANSMITTING...';

      try{
        await push(ref(db, "messages/" + to), {
          from: deviceID,
          text: text,
          time: Date.now()
        });

        msgInput.value = "";
        statusBox.innerHTML = '<span class="blinker"></span>TRANSMISSION SENT';
        setTimeout(() => {
          statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ONLINE';
        }, 1200);
      }catch(err){
        console.error(err);
        alert("TRANSMISSION FAILED");
        statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ERROR';
      }finally{
        sendBtn.disabled = false;
      }
    };

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendBtn.click();
      }
    });

    onChildAdded(ref(db, "messages/" + deviceID), (data) => {
      const msg = data.val();
      showMessage(msg);
      statusBox.innerHTML = '<span class="blinker"></span>NEW INCOMING SIGNAL';
    });
  </script>
</body>
</html>
