<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NU Pager Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0c0b;
      --panel:#111513;
      --panel-2:#161b18;
      --line:#7fb9a2;
      --line-soft:#547566;
      --text:#d8dccf;
      --muted:#9aa08f;
      --accent:#b89a63;
      --accent-soft:#7d6841;
      --warn:#d8b36a;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:
        linear-gradient(rgba(255,255,255,0.015), rgba(255,255,255,0.01)),
        radial-gradient(circle at top, rgba(184,154,99,0.04), transparent 28%),
        radial-gradient(circle at bottom, rgba(127,185,162,0.03), transparent 32%),
        var(--bg);
      color:var(--text);
      font-family:'Orbitron', monospace;
      padding:8px;
      letter-spacing:0.4px;
      position:relative;
      overflow-x:hidden;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 2px,
        rgba(160,180,160,0.025) 3px
      );
      opacity:0.45;
      mix-blend-mode:screen;
    }

    .shell{
      max-width:720px;
      min-height:calc(100vh - 16px);
      margin:0 auto;
      padding:12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.008)),
        linear-gradient(135deg, rgba(184,154,99,0.03), transparent 30%),
        var(--panel);
      border:1px solid rgba(184,154,99,0.22);
      border-radius:10px;
      position:relative;
      display:flex;
      flex-direction:column;
      box-shadow:
        inset 0 0 0 1px rgba(127,185,162,0.06),
        0 0 0 1px rgba(0,0,0,0.35);
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:7px;
      border:1px solid rgba(184,154,99,0.14);
      border-radius:7px;
      pointer-events:none;
    }

    .topbar{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:8px;
    }

    .title{
      font-size:20px;
      font-weight:600;
      color:#98d3bc;
      letter-spacing:1px;
    }

    .sub{
      font-size:10px;
      line-height:1.35;
      color:var(--accent);
      text-transform:uppercase;
      opacity:0.92;
    }

    .unit{
      border:1px solid rgba(127,185,162,0.4);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005)),
        var(--panel-2);
      padding:10px;
    }

    .unit-label{
      font-size:10px;
      color:var(--accent);
      margin-bottom:6px;
      text-transform:uppercase;
    }

    .unit-id{
      font-size:18px;
      color:#9ad0bb;
    }

    .status{
      margin:6px 0 10px;
      color:var(--warn);
      font-size:12px;
      min-height:18px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .blinker{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#8bb99f;
      opacity:0.85;
      animation:blink 1.4s infinite;
      flex:0 0 auto;
    }

    @keyframes blink{
      0%,100%{opacity:0.25}
      50%{opacity:0.9}
    }

    .screen-frame{
      flex:1;
      min-height:0;
      border:1px solid rgba(184,154,99,0.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.004)),
        #0b0f0d;
      padding:8px;
      margin-bottom:10px;
    }

    #screen{
      height:100%;
      min-height:220px;
      overflow:auto;
      border:2px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(127,185,162,0.02), rgba(184,154,99,0.02)),
        #0a0d0c;
      padding:10px;
    }

    .empty{
      color:var(--muted);
      font-size:12px;
      opacity:0.8;
    }

    .msg{
      margin-bottom:10px;
      padding:8px 10px;
      background:rgba(255,255,255,0.02);
      border-left:4px solid var(--accent);
    }

    .meta{
      font-size:11px;
      color:var(--accent);
      margin-bottom:4px;
      text-transform:uppercase;
    }

    .text{
      font-size:14px;
      color:var(--text);
      line-height:1.45;
      word-break:break-word;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .label{
      font-size:10px;
      color:var(--accent);
      margin-bottom:4px;
      text-transform:uppercase;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    input{
      width:100%;
      padding:12px 10px;
      background:#0a0d0c;
      color:var(--text);
      border:1px solid var(--line-soft);
      outline:none;
      font-family:'Orbitron', monospace;
      font-size:15px;
    }

    input::placeholder{
      color:#7f8678;
    }

    input:focus{
      border-color:var(--accent);
      background:#0c100e;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:2px;
    }

    button{
      padding:12px 16px;
      min-width:140px;
      border:1px solid rgba(184,154,99,0.45);
      background:
        linear-gradient(180deg, #b89a63, #8a7348);
      color:#111;
      font-family:'Orbitron', monospace;
      font-size:14px;
      cursor:pointer;
    }

    button:disabled{
      opacity:0.55;
      cursor:not-allowed;
    }

    .hint{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
    }

    @media (max-width:640px){
      body{
        padding:6px;
      }

      .shell{
        min-height:calc(100vh - 12px);
        padding:10px;
      }

      .title{
        font-size:18px;
      }

      .unit-id{
        font-size:16px;
      }

      #screen{
        min-height:200px;
      }

      button{
        width:100%;
        min-width:unset;
      }

      .hint{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title">NU PAGER</div>
      <div class="sub">REBEL SIGNAL NODE · STEAM-CORE COMMUNICATOR</div>

      <div class="unit">
        <div class="unit-label">UNIT IDENTIFICATION</div>
        <div class="unit-id" id="device">BOOTING...</div>
      </div>
    </div>

    <div class="status" id="status">
      <span class="blinker"></span>
      LINKING TO NETWORK...
    </div>

    <div class="screen-frame">
      <div id="screen">
        <div class="empty" id="emptyState">NO INCOMING SIGNAL</div>
      </div>
    </div>

    <div class="controls">
      <div class="field">
        <div class="label">TRANSMIT TO</div>
        <input id="to" placeholder="NP-0001">
      </div>

      <div class="field">
        <div class="label">MESSAGE PAYLOAD</div>
        <input id="msg" maxlength="80" placeholder="ENTER MESSAGE">
      </div>

      <div class="actions">
        <button id="send" disabled>TRANSMIT</button>
        <div class="hint">DIRECT DEVICE MESSAGE · PRIVATE CHANNEL</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      push,
      onChildAdded,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
      authDomain: "nu-pager-network.firebaseapp.com",
      databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
      projectId: "nu-pager-network",
      storageBucket: "nu-pager-network.firebasestorage.app",
      messagingSenderId: "1037097080836",
      appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const toInput = document.getElementById("to");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const screen = document.getElementById("screen");
    const deviceBox = document.getElementById("device");
    const statusBox = document.getElementById("status");
    const emptyState = document.getElementById("emptyState");

    let deviceID = localStorage.getItem("deviceID") || "";

    async function registerDevice(){
      if(!deviceID){
        const counterRef = ref(db, "deviceCounter");
        const result = await runTransaction(counterRef, current => (current || 0) + 1);
        const number = result.snapshot.val();
        deviceID = "NP-" + String(number).padStart(4, "0");
        localStorage.setItem("deviceID", deviceID);
      }

      deviceBox.innerText = deviceID;
      statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ONLINE';
      sendBtn.disabled = false;
    }

    function showMessage(msg){
      if(emptyState) emptyState.style.display = "none";

      const wrapper = document.createElement("div");
      wrapper.className = "msg";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerText = "INCOMING FROM : " + (msg.from || "UNKNOWN");

      const text = document.createElement("div");
      text.className = "text";
      text.innerText = msg.text || "";

      wrapper.appendChild(meta);
      wrapper.appendChild(text);
      screen.appendChild(wrapper);
      screen.scrollTop = screen.scrollHeight;
    }

    await registerDevice();

    sendBtn.onclick = async () => {
      const to = toInput.value.trim().toUpperCase();
      const text = msgInput.value.trim();

      if(!to){
        alert("ENTER TARGET DEVICE ID");
        return;
      }

      if(!text){
        return;
      }

      sendBtn.disabled = true;
      statusBox.innerHTML = '<span class="blinker"></span>TRANSMITTING...';

      try{
        await push(ref(db, "messages/" + to), {
          from: deviceID,
          text: text,
          time: Date.now()
        });

        msgInput.value = "";
        statusBox.innerHTML = '<span class="blinker"></span>TRANSMISSION SENT';
        setTimeout(() => {
          statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ONLINE';
        }, 1200);
      }catch(err){
        console.error(err);
        alert("TRANSMISSION FAILED");
        statusBox.innerHTML = '<span class="blinker"></span>CHANNEL ERROR';
      }finally{
        sendBtn.disabled = false;
      }
    };

    msgInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendBtn.click();
      }
    });

    onChildAdded(ref(db, "messages/" + deviceID), (data) => {
      const msg = data.val();
      showMessage(msg);
      statusBox.innerHTML = '<span class="blinker"></span>NEW INCOMING SIGNAL';
    });
  </script>
</body>
</html>
