<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NU Pager</title>

<style>
body{
  background:black;
  color:#00ff88;
  font-family:monospace;
  padding:20px;
}
#device{
  margin-bottom:10px;
  color:#7dffbf;
}
#screen{
  border:1px solid #00ff88;
  height:300px;
  overflow:auto;
  padding:10px;
  margin-bottom:10px;
}
input{
  width:70%;
  padding:10px;
  background:black;
  color:#00ff88;
  border:1px solid #00ff88;
  margin-bottom:10px;
  display:block;
}
button{
  padding:10px;
  background:#00ff88;
  border:none;
}
.msg{
  margin-bottom:10px;
}
.meta{
  color:#7dffbf;
}
</style>
</head>

<body>

<h3>NU PAGER</h3>
<div id="device"></div>
<div id="screen"></div>

<input id="to" placeholder="send to device (NP-0001)">
<input id="msg" placeholder="type message">
<button id="send">SEND</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
  authDomain: "nu-pager-network.firebaseapp.com",
  databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
  projectId: "nu-pager-network",
  storageBucket: "nu-pager-network.firebasestorage.app",
  messagingSenderId: "1037097080836",
  appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const toInput = document.getElementById("to");
const input = document.getElementById("msg");
const sendBtn = document.getElementById("send");
const screen = document.getElementById("screen");

let deviceID = localStorage.getItem("deviceID");

async function registerDevice(){
  if(!deviceID){
    const counterRef = ref(db, "deviceCounter");
    const result = await runTransaction(counterRef, current => (current || 0) + 1);
    const number = result.snapshot.val();

    deviceID = "NP-" + String(number).padStart(4, "0");
    localStorage.setItem("deviceID", deviceID);
  }

  document.getElementById("device").innerText = "DEVICE : " + deviceID;
}

function addMessage(msg){
  const box = document.createElement("div");
  box.className = "msg";

  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerText = "FROM : " + (msg.from || "UNKNOWN");

  const text = document.createElement("div");
  text.innerText = msg.text || "";

  box.appendChild(meta);
  box.appendChild(text);
  screen.appendChild(box);
  screen.scrollTop = screen.scrollHeight;
}

await registerDevice();

sendBtn.onclick = async ()=>{
  const to = toInput.value.trim().toUpperCase();
  const text = input.value.trim();

  if(!to){
    alert("Please enter target device ID");
    return;
  }

  if(!text){
    return;
  }

  await push(ref(db, "messages/" + to), {
    from: deviceID,
    text: text,
    time: Date.now()
  });

  input.value = "";
};

onChildAdded(ref(db, "messages/" + deviceID), (data)=>{
  const msg = data.val();
  addMessage(msg);
});
</script>

</body>
</html>
