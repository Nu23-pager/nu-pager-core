<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHCoBm1A-0XNYIgX6TXAXA0vkb5P_hJs4",
  authDomain: "nu-pager-network.firebaseapp.com",
  databaseURL: "https://nu-pager-network-default-rtdb.firebaseio.com",
  projectId: "nu-pager-network",
  storageBucket: "nu-pager-network.firebasestorage.app",
  messagingSenderId: "1037097080836",
  appId: "1:1037097080836:web:cf63b5d9125ef13c6cfd51"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

const input = document.getElementById("msg");
const sendBtn = document.getElementById("send");
const screen = document.getElementById("screen");

sendBtn.onclick = () => {

let text = input.value;

if(!text) return;

push(messagesRef,{
text:text,
time:Date.now()
});

input.value="";
};

onChildAdded(messagesRef,(data)=>{

let msg = data.val();

let div = document.createElement("div");

div.innerText = msg.text;

screen.appendChild(div);

});

</script>
